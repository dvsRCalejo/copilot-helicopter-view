TranscriptViewerScreen:
  Properties:
    Fill: =gblColorBg
    OnVisible: |
      =// Parse the JSON content field into a renderable collection
      ClearCollect(
        colMessages,
        // The content field is an array of Bot Framework Activity objects
        // Filter to only message-type activities
        Filter(
          Table(ParseJSON(gblSelectedTranscript.content)),
          Value(ThisRecord.type) = "message"
        )
      )

  Children:

    # ── Header ────────────────────────────────────────────────────────────────────
    - recHeader:
        Control: Rectangle
        Properties:
          Fill: =gblColorPrimary
          Height: =64
          Width: =Parent.Width
          X: =0
          Y: =0

    - btnBack:
        Control: Button
        Properties:
          Text: ="← Back"
          OnSelect: =Navigate(AgentDetailScreen, ScreenTransition.Fade)
          Height: =36
          Width: =80
          X: =16
          Y: =14
          Fill: =RGBA(255,255,255,0.15)
          Color: =RGBA(255,255,255,1)
          BorderRadius: =6
          BorderThickness: =0
          Font: =Font.'Segoe UI'
          FontWeight: =FontWeight.Semibold
          Size: =13

    - lblTranscriptTitle:
        Control: Label
        Properties:
          Text: ="Transcript: " & If(IsBlank(gblSelectedTranscript.Name), "Session " & Left(gblSelectedTranscript.conversationtranscriptid, 8), gblSelectedTranscript.Name)
          Font: =Font.'Segoe UI'
          FontWeight: =FontWeight.Bold
          Size: =16
          Color: =RGBA(255,255,255,1)
          Height: =64
          Width: =Parent.Width - 250
          X: =108
          Y: =0
          VerticalAlign: =VerticalAlign.Middle

    - lblTranscriptDate:
        Control: Label
        Properties:
          Text: =Text(DateTimeValue(gblSelectedTranscript.createdon), DateTimeFormat.LongDateTime24)
          Font: =Font.'Segoe UI'
          Size: =12
          Color: =RGBA(210,210,210,1)
          Height: =64
          Width: =220
          X: =Parent.Width - 236
          Y: =0
          VerticalAlign: =VerticalAlign.Middle
          Align: =Align.Right

    # ── Message count banner ─────────────────────────────────────────────────────
    - recInfoBar:
        Control: Rectangle
        Properties:
          Fill: =gblColorSurface
          Height: =40
          Width: =Parent.Width
          X: =0
          Y: =64
          BorderColor: =gblColorBorder
          BorderThickness: =1

    - lblMessageCount:
        Control: Label
        Properties:
          Text: =CountRows(colMessages) & " message(s)  •  Agent: " & gblSelectedAgent.Name
          Font: =Font.'Segoe UI'
          Size: =13
          Color: =gblColorTextMuted
          Height: =40
          Width: =Parent.Width - 32
          X: =16
          Y: =64
          VerticalAlign: =VerticalAlign.Middle

    # ── Chat gallery ─────────────────────────────────────────────────────────────
    - galMessages:
        Control: Gallery
        Variant: galleryVertical
        Properties:
          Items: =colMessages
          Height: =Parent.Height - 108
          Width: =Parent.Width - 32
          X: =16
          Y: =108
          TemplateHeight: =80
          TemplatePadding: =8
          ShowScrollbar: =true

        Children:
          # User bubble (right-aligned) vs Bot bubble (left-aligned)
          - recBubble:
              Control: Rectangle
              Properties:
                Fill: =If(
                  Lower(Text(Value(ThisRecord.from.role))) = "user",
                  RGBA(0, 120, 212, 1),
                  RGBA(237, 235, 233, 1)
                )
                Height: =60
                Width: =Min(600, Parent.TemplateWidth * 0.65)
                X: =If(
                  Lower(Text(Value(ThisRecord.from.role))) = "user",
                  Parent.TemplateWidth - Min(600, Parent.TemplateWidth * 0.65) - 8,
                  8
                )
                Y: =4
                RadiusTopLeft: =12
                RadiusTopRight: =12
                RadiusBottomLeft: =If(Lower(Text(Value(ThisRecord.from.role))) = "user", 12, 2)
                RadiusBottomRight: =If(Lower(Text(Value(ThisRecord.from.role))) = "user", 2, 12)

          - lblMessageText:
              Control: Label
              Properties:
                Text: =Text(Value(ThisRecord.text))
                Font: =Font.'Segoe UI'
                Size: =13
                Color: =If(
                  Lower(Text(Value(ThisRecord.from.role))) = "user",
                  RGBA(255,255,255,1),
                  gblColorText
                )
                Height: =52
                Width: =Min(584, Parent.TemplateWidth * 0.63)
                X: =If(
                  Lower(Text(Value(ThisRecord.from.role))) = "user",
                  Parent.TemplateWidth - Min(600, Parent.TemplateWidth * 0.65),
                  16
                )
                Y: =8
                Overflow: =Overflow.Scroll
                VerticalAlign: =VerticalAlign.Top

          - lblSenderLabel:
              Control: Label
              Properties:
                Text: =If(
                  Lower(Text(Value(ThisRecord.from.role))) = "user",
                  "User",
                  "Bot"
                )
                Font: =Font.'Segoe UI'
                Size: =10
                Color: =gblColorTextMuted
                Height: =16
                Width: =40
                X: =If(
                  Lower(Text(Value(ThisRecord.from.role))) = "user",
                  Parent.TemplateWidth - 50,
                  8
                )
                Y: =66

    # ── Empty state ──────────────────────────────────────────────────────────────
    - lblNoContent:
        Control: Label
        Properties:
          Visible: =CountRows(colMessages) = 0
          Text: ="This transcript has no message-type activities, or the content could not be parsed."
          Font: =Font.'Segoe UI'
          Size: =14
          Color: =gblColorTextMuted
          Align: =Align.Center
          Height: =60
          Width: =500
          X: =(Parent.Width - 500) / 2
          Y: =200
