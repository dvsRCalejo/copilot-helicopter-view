# ──────────────────────────────────────────────────────────────
# Release workflow
#
# Triggers on a pushed tag like v1.0.0 or v1.2.0-beta.
# Automatically:
#   1. Stamps the tag version into Solution.xml
#   2. Packs managed + unmanaged Power Platform solutions
#   3. Bundles the webapp Docker artifacts
#   4. Creates a GitHub Release with all three assets
# ──────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # ── Checkout ──────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Derive version from tag ───────────────────────────────
      - name: Set VERSION env
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # ── Stamp version into Solution.xml ───────────────────────
      - name: Update solution version
        run: |
          sed -i "s|<Version>.*</Version>|<Version>${VERSION}</Version>|" \
            solution/src/Other/Solution.xml
          echo "Solution version set to: $VERSION"
          grep '<Version>' solution/src/Other/Solution.xml

      # ── Install PAC CLI and pack solutions ────────────────────
      - name: Install Power Platform CLI
        run: |
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Pack unmanaged solution
        run: |
          pac solution pack \
            --zipfile "solution/MyAgentsHelicopterView_${VERSION}_unmanaged.zip" \
            --folder solution/src \
            --packagetype Unmanaged

      - name: Pack managed solution
        run: |
          pac solution pack \
            --zipfile "solution/MyAgentsHelicopterView_${VERSION}_managed.zip" \
            --folder solution/src \
            --packagetype Managed

      # ── Bundle webapp Docker artifacts ────────────────────────
      - name: Create webapp Docker release bundle
        run: |
          mkdir -p _release/webapp
          cp -r webapp/src webapp/package.json webapp/package-lock.json \
                webapp/tsconfig.json webapp/tsconfig.node.json webapp/vite.config.ts \
                webapp/index.html webapp/Dockerfile webapp/docker-compose.yml \
                webapp/nginx.conf _release/webapp/ 2>/dev/null || true
          # Include .env.example
          if [ -f webapp/.env.example ]; then
            cp webapp/.env.example _release/webapp/.env.example
          else
            cat > _release/webapp/.env.example <<'EOF'
          VITE_CLIENT_ID=<your-entra-app-client-id>
          VITE_TENANT_ID=<your-azure-ad-tenant-id>
          VITE_DATAVERSE_URL=https://<your-org>.crm.dynamics.com
          EOF
          fi
          cd _release && zip -r ../webapp-docker-${VERSION}.zip webapp/

      # ── Create GitHub Release ─────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ env.VERSION }}"
          generate_release_notes: true
          files: |
            solution/MyAgentsHelicopterView_${{ env.VERSION }}_managed.zip
            solution/MyAgentsHelicopterView_${{ env.VERSION }}_unmanaged.zip
            webapp-docker-${{ env.VERSION }}.zip
