App:
  Properties:
    MinScreenHeight: =768
    MinScreenWidth: =1366
    OnStart: |
      =// ── Bootstrap: resolve current user and load all accessible agents ──────────
      Set(
        gblCurrentUser,
        Office365Users.MyProfileV2()
      );
      // gblTheme colours used across all screens
      Set(gblColorPrimary,   RGBA(0, 120, 212, 1));
      Set(gblColorBg,        RGBA(243, 242, 241, 1));
      Set(gblColorSurface,   RGBA(255, 255, 255, 1));
      Set(gblColorBorder,    RGBA(225, 223, 221, 1));
      Set(gblColorText,      RGBA(50,  49,  48,  1));
      Set(gblColorTextMuted, RGBA(96,  94,  92,  1));
      // Load agents visible to the current user.
      // Dataverse row-level security automatically scopes this to
      // records the user owns or that have been shared with them.
      ClearCollect(
        colAgents,
        AddColumns(
          Copilots,
          "IsOwner",
          'Owning User'.'Full Name' = gblCurrentUser.displayName,
          "TranscriptCount",
          CountRows(
            Filter('Conversation Transcripts', Bot.Bot = botid)
          )
        )
      );
      // Default filter
      Set(gblFilterMode, "All");
      Set(gblSortMode, "Newest");
      Set(gblSelectedAgent, Blank());
      Set(gblSelectedTranscript, Blank());
